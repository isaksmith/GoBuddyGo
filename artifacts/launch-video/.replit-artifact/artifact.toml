kind = "video"
previewPath = "/launch-video/"
title = "GoBuddyGo Launch Video"
version = "1.0.0"
id = "artifacts/launch-video"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/launch-video/" ]
localPort = 19679

[services.development]
run = "pnpm --filter @workspace/launch-video run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/launch-video", "run", "build" ]
publicDir = "artifacts/launch-video/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19679"
BASE_PATH = "/launch-video/"
