<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800" preserveAspectRatio="xMidYMid slice">
  <!-- Sky background -->
  <rect width="400" height="800" fill="#87CEEB"/>

  <!-- Stars / sparkles -->
  <circle cx="30" cy="60" r="3" fill="#FFFDE7" opacity="0.8"/>
  <circle cx="80" cy="30" r="2" fill="#FFFDE7" opacity="0.7"/>
  <circle cx="150" cy="50" r="2.5" fill="#FFFDE7" opacity="0.8"/>
  <circle cx="200" cy="20" r="2" fill="#FFFDE7" opacity="0.7"/>
  <circle cx="260" cy="45" r="3" fill="#FFFDE7" opacity="0.8"/>
  <circle cx="340" cy="25" r="2" fill="#FFFDE7" opacity="0.7"/>
  <circle cx="370" cy="65" r="2.5" fill="#FFFDE7" opacity="0.8"/>

  <!-- Sun with rays (top-right) -->
  <g transform="translate(315, 115)">
    <!-- Rays -->
    <line x1="0" y1="-52" x2="0" y2="-42" stroke="#FFD600" stroke-width="3" stroke-linecap="round"/>
    <line x1="26" y1="-45" x2="21" y2="-36" stroke="#FFD600" stroke-width="3" stroke-linecap="round"/>
    <line x1="45" y1="-26" x2="36" y2="-21" stroke="#FFD600" stroke-width="3" stroke-linecap="round"/>
    <line x1="52" y1="0" x2="42" y2="0" stroke="#FFD600" stroke-width="3" stroke-linecap="round"/>
    <line x1="45" y1="26" x2="36" y2="21" stroke="#FFD600" stroke-width="3" stroke-linecap="round"/>
    <line x1="26" y1="45" x2="21" y2="36" stroke="#FFD600" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="52" x2="0" y2="42" stroke="#FFD600" stroke-width="3" stroke-linecap="round"/>
    <line x1="-26" y1="45" x2="-21" y2="36" stroke="#FFD600" stroke-width="3" stroke-linecap="round"/>
    <line x1="-45" y1="26" x2="-36" y2="21" stroke="#FFD600" stroke-width="3" stroke-linecap="round"/>
    <line x1="-52" y1="0" x2="-42" y2="0" stroke="#FFD600" stroke-width="3" stroke-linecap="round"/>
    <line x1="-45" y1="-26" x2="-36" y2="-21" stroke="#FFD600" stroke-width="3" stroke-linecap="round"/>
    <line x1="-26" y1="-45" x2="-21" y2="-36" stroke="#FFD600" stroke-width="3" stroke-linecap="round"/>
    <!-- Sun body -->
    <circle cx="0" cy="0" r="38" fill="#FDD835"/>
    <circle cx="0" cy="0" r="32" fill="#FFEE58" opacity="0.6"/>
  </g>

  <!-- Cloud 1 -->
  <ellipse cx="60" cy="160" rx="40" ry="22" fill="white" opacity="0.85"/>
  <ellipse cx="35" cy="168" rx="28" ry="16" fill="white" opacity="0.85"/>
  <ellipse cx="85" cy="168" rx="28" ry="16" fill="white" opacity="0.85"/>
  <ellipse cx="70" cy="166" rx="20" ry="18" fill="white" opacity="0.85"/>

  <!-- Cloud 2 -->
  <ellipse cx="250" cy="200" rx="30" ry="16.5" fill="white" opacity="0.85"/>
  <ellipse cx="231" cy="206" rx="21" ry="12" fill="white" opacity="0.85"/>
  <ellipse cx="269" cy="206" rx="21" ry="12" fill="white" opacity="0.85"/>
  <ellipse cx="258" cy="204.5" rx="15" ry="13.5" fill="white" opacity="0.85"/>

  <!-- Cloud 3 -->
  <ellipse cx="160" cy="290" rx="24" ry="13.2" fill="white" opacity="0.85"/>
  <ellipse cx="145" cy="294.8" rx="16.8" ry="9.6" fill="white" opacity="0.85"/>
  <ellipse cx="175" cy="294.8" rx="16.8" ry="9.6" fill="white" opacity="0.85"/>
  <ellipse cx="166" cy="293.6" rx="12" ry="10.8" fill="white" opacity="0.85"/>

  <!-- Waves at bottom -->
  <path d="M0,640 C60,610 120,670 180,640 C240,610 300,670 360,640 C380,630 390,635 400,640 L400,800 L0,800 Z" fill="#4FC3F7" opacity="0.45"/>
  <path d="M0,660 C50,635 110,680 180,660 C250,640 310,680 380,655 C390,652 395,656 400,660 L400,800 L0,800 Z" fill="#0288D1" opacity="0.35"/>
  <path d="M0,680 C70,660 130,695 200,680 C270,665 330,695 400,678 L400,800 L0,800 Z" fill="#0277BD" opacity="0.5"/>
</svg>
